<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Create an account</h2>

  <form id="registerForm">

    <label for="uname">Username</label>
    <input type="text" id="uname" name="username" required><br><br>

    <label for="pw">Password</label>
    <input type="password" id="pw" name="password" required><br><br>

    <!-- Checkbox that triggers the email field -->
    <label>
      <input type="checkbox" id="newsCheck" onchange="toggleEmail(this)">
      Receive news and updates
    </label>

    <!-- Email field — hidden by default -->
    <div id="emailSection" style="display: none; margin-top: 12px;">
      <label for="emailInput">Email address</label>
      <input type="email" id="emailInput" name="email">
    </div>

    <br><br>
    <button type="submit">Create account</button>

  </form>
  <script>
    function toggleEmail(checkbox) {
        const section = document.getElementById('emailSection');
        section.style.display = checkbox.checked ? 'block' : 'none';
        
    }
  </script>
</body>
</html>
